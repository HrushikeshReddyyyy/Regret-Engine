name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regret-engine

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: regret-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run smoke

      - name: Production build
        run: npm run build
